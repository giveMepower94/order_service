services:
  postgres:
    image: postgres:17
    container_name: order_service_postgres
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - order_service_pg_data:/var/lib/postgresql/data

volumes:
  order_service_pg_data: